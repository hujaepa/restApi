version: "3.9"
networks:
  dbnet:
    external: true
services:
  app2:
    build: .
    restart: unless-stopped
    environment:
      - PORT=4443
      - DB_HOST=mysql       # MUST match the MySQL container name on dbnet
      - DB_USER=hujaepa
      - DB_PASSWORD=2008F@cKsDB
      - DB_NAME=restgqldb
      - TLS_MIN=TLSv1.3
      - TLS_MAX=TLSv1.3
      - TLS_MODE=AES256
    volumes:
      - /srv/certs/restApi:/certs:ro
    ports:
      - "4443:4443"
    networks: [dbnet]
volumes:
  mysql_data:
